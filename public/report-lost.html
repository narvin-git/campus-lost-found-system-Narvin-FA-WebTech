<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Report Lost Item</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="header">
    <h1>Report Lost Item</h1>
    <p class="subtitle">Fill in the details of the item you lost.</p>
  </header>

  <main class="container">
    <nav class="card">
      <a class="btn btn-secondary" href="/">Home</a>
      <a class="btn btn-secondary" href="lost-items.html">View Lost Items</a>
    </nav>

    <section class="card">
        <form id="itemForm" class="form" data-category="Lost">
        <div class="field">
          <label for="title">Title</label>
          <input id="title" name="title" type="text" maxlength="150" required />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="4" required></textarea>
        </div>

        <div class="field">
          <label for="location">Location</label>
          <input id="location" name="location" type="text" maxlength="150" required />
        </div>

        <div class="field">
          <label for="date">Date Lost</label>
          <input id="date" name="date" type="date" required />
        </div>

        <div class="field">
          <label for="contact">Contact Information</label>
          <input id="contact" name="contact" type="text" maxlength="150" placeholder="Phone or email" required />
        </div>

        <button class="btn" type="submit">Submit Lost Report</button>
        <p id="msg" class="msg"></p>
      </form>
    </section>
  </main>


  <script src="./js/form.js"></script>
</body>
</html>
