<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lost Items</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="header">
    <h1>Lost Items</h1>
    <p class="subtitle">Browse all reported lost items on campus.</p>
  </header>

  <main class="container">
    <nav class="card">
      <a class="btn btn-secondary" href="/">Home</a>
      <a class="btn" href="report-lost.html">Report Lost Item</a>
    </nav>

    <section class="card">
      <h2>Lost Item Reports</h2>

      <div class="tableWrap">
        <table class="table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Location</th>
              <th>Date</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="itemsBody">
            <tr><td colspan="5">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- ✅ External JS only (CSP safe) -->
  <script src="./js/api.js"></script>
  <script src="./js/lost-items.js"></script>
</body>
</html>
